        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCjJFKN3G9wFf-WigjPLN_p1Ukj_yqUga0",
            authDomain: "minitcurai-22677.firebaseapp.com",
            projectId: "minitcurai-22677",
            storageBucket: "minitcurai-22677.firebasestorage.app",
            messagingSenderId: "993950326474",
            appId: "1:993950326474:web:8e833180275aa538951e33",
            measurementId: "G-SYGGMK3GG0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'skpk-miri-minit-curai';

        const senaraiNamaStaff = [
            "AZIZ BIN TAHIR", "MOHAMAD ABIDIN BIN SIPEK", "LING MEE CHOO", "SALIHIN BIN AHMAD",
            "AIDA MASTURINA BINTI HAMKA", "AIFA NUR BESTARI BINTI RADUAN", "BRYAN ANAK CONSTANT",
            "CHRISTIAN SIMON", "DLIYANA ANAK JOHN", "EIFILISIA AMBER ANAK MERVIN", "FAZRI BIN BAKERI",
            "HAIROL BIN ISMAIL", "HILWA HAYATI BINTI MOHAMAD AJALAN", "JACQUELINE TIONG HOE DING",
            "JERIAH ANAK SIMON", "JIMMY ANAK PETER", "KHAIRI BIN SAHARI", 
            "MARY JANE AMOI UMPANG ANAK DANIEL MAWAT", "MOHD RAFEEQ BIN SULAIMAN", 
            "MUHAMMAD ZULHUSAINI BIN ABDUL WAHAB", "NUR HIDAYU BINTI YUSOP", 
            "NURUL HUDA BTE MOHD IHWAN", "NUR AZLIN BINTI NORIZAN", "NUR FADZLIAH AMAL BINTI OSMAN",
            "SABARIAH BINTI SOLHI", "SYAEEZA LIANA BINTI RAMLI", "TENG RU YUN", "TING HUA EE",
            "TING YU YONG", "VANITHA A/P SUBRAMANIAM", "WONG PICK KING", "ZEPRINA ANAK BENIK",
            "NORMIRI BINTI ABDULLAH", "HAZUANI BINTI HIPNI", "HELLEN RANJA ANAK BELI", 
            "NORAISYAH BINTI ASHARI", "KAMARIA BINTI BUJANG", "AZENI BIN MAT", "EVELYN SENA ANAK USSIK",
            "MARIATI BINTI JULAIHI", "ALEXANDER LIPA ANAK RANTIE"
        ];

        const initialFormState = {
            rujukanBil: '', namaPegawai: '', jawatan: '', perkara: '', tarikh: '', tempat: '',
            anjuran: '', pengerusi: '', bahanEdaran: 'Ada', kandunganPenganjuran: '',
            kandunganObjektif: '', kandunganKandungan: '', kandunganLain: '', tindakanSusulan: '',
            disahkanOleh: '', tandatanganPegawai: '', tandatanganPengesah: ''
        };

        // KOMPONEN PAD TANDATANGAN DIGITAL
        function SignaturePad({ value, onChange, label }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (value) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = value;
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }, [value]);

            const startDrawing = (e) => {
                if(e.cancelable) e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                if(e.cancelable) e.preventDefault();
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#000000';
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if (!isDrawing) return;
                setIsDrawing(false);
                const canvas = canvasRef.current;
                onChange(canvas.toDataURL('image/png'));
            };

            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                onChange('');
            };

            return (
                <div className="border border-gray-300 rounded-md p-3 bg-white flex flex-col items-center w-full shadow-sm">
                    <p className="text-sm text-gray-700 mb-2 font-semibold w-full text-left">{label}</p>
                    <div className="border border-dashed border-gray-400 bg-gray-50 touch-none w-full max-w-[400px] flex justify-center rounded overflow-hidden">
                        <canvas
                            ref={canvasRef}
                            width={400}
                            height={150}
                            className="touch-none w-full h-[150px] cursor-crosshair bg-white"
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseLeave={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={draw}
                            onTouchEnd={stopDrawing}
                        />
                    </div>
                    <div className="w-full max-w-[400px] flex justify-end mt-2">
                        <button type="button" onClick={clear} className="text-xs font-bold text-red-600 hover:text-red-800 flex items-center bg-red-50 px-2 py-1 rounded border border-red-100">
                            <i className="fas fa-eraser mr-1"></i> Padam & Lukis Semula
                        </button>
                    </div>
                </div>
            );
        }

        // --- KOMPONEN UTAMA ---
        function SistemMinitCurai() {
            const [activeTab, setActiveTab] = useState('form');
            const [records, setRecords] = useState([]);
            const [currentRecord, setCurrentRecord] = useState(null);
            const [editingId, setEditingId] = useState(null);
            
            // State untuk Modal Pengesahan
            const [approvingRecord, setApprovingRecord] = useState(null);
            const [approveData, setApproveData] = useState({ disahkanOleh: '', tandatanganPengesah: '' });

            // State untuk Modal Padam
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const [user, setUser] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const [formData, setFormData] = useState(initialFormState);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth Error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pathRef = collection(db, 'artifacts', appId, 'public', 'data', 'minit_curai');
                
                const unsubscribe = onSnapshot(pathRef, (snapshot) => {
                    const data = snapshot.docs.map(docSnapshot => ({ id: docSnapshot.id, ...docSnapshot.data() }));
                    data.sort((a, b) => {
                        const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : Date.now();
                        const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : Date.now();
                        return timeB - timeA;
                    });
                    setRecords(data);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
                
                return () => unsubscribe();
            }, [user]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSignatureChange = (field, dataUrl) => {
                setFormData(prev => ({ ...prev, [field]: dataUrl }));
            };

            const showToast = (msg, type = 'success') => {
                setToastMessage({ msg, type });
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !user) {
                    showToast("Pangkalan data tidak dikesan. Sila tetapkan Firebase Config.", "error");
                    return;
                }
                
                setIsSubmitting(true);
                try {
                    const pathRef = collection(db, 'artifacts', appId, 'public', 'data', 'minit_curai');
                    
                    if (editingId) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'minit_curai', editingId);
                        await updateDoc(docRef, {
                            ...formData,
                            updatedAt: serverTimestamp()
                        });
                        showToast("Minit Curai berjaya dikemas kini!", "success");
                    } else {
                        await addDoc(pathRef, {
                            ...formData,
                            createdAt: serverTimestamp(),
                            userId: user.uid
                        });
                        showToast("Minit Curai berjaya disimpan!", "success");
                    }
                    
                    setFormData(initialFormState);
                    setEditingId(null);
                    setActiveTab('list');
                } catch (error) {
                    console.error("Submit error:", error);
                    showToast("Ralat ketika menyimpan borang.", "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleEdit = (record) => {
                setFormData({
                    ...initialFormState,
                    ...record
                });
                setEditingId(record.id);
                setActiveTab('form');
                window.scrollTo(0, 0);
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setFormData(initialFormState);
                setActiveTab('list');
            };

            const handleNewForm = () => {
                setEditingId(null);
                setFormData(initialFormState);
                setActiveTab('form');
            };

            // FUNGSI PADAM YANG TELAH DIKEMAS KINI
            const confirmDelete = async () => {
                if (!db || !user || !deleteConfirmId) return;
                
                setIsSubmitting(true);
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'minit_curai', deleteConfirmId);
                    await deleteDoc(docRef);
                    showToast("Rekod berjaya dipadam.", "success");
                } catch (error) {
                    console.error("Delete error:", error);
                    showToast("Ralat memadam rekod.", "error");
                } finally {
                    setIsSubmitting(false);
                    setDeleteConfirmId(null); // Tutup modal selepas berjaya
                }
            };

            // FUNGSI UNTUK MODAL PENGESAHAN (APPROVE)
            const openApproveModal = (record) => {
                setApprovingRecord(record);
                setApproveData({
                    disahkanOleh: record.disahkanOleh || '',
                    tandatanganPengesah: record.tandatanganPengesah || ''
                });
            };

            const closeApproveModal = () => {
                setApprovingRecord(null);
                setApproveData({ disahkanOleh: '', tandatanganPengesah: '' });
            };

            const submitApprove = async () => {
                if (!db || !user) {
                    showToast("Pangkalan data tidak dikesan.", "error");
                    return;
                }
                
                if (!approveData.disahkanOleh) {
                    showToast("Sila pilih Nama Pengesah terlebih dahulu.", "error");
                    return;
                }

                setIsSubmitting(true);
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'minit_curai', approvingRecord.id);
                    await updateDoc(docRef, {
                        disahkanOleh: approveData.disahkanOleh,
                        tandatanganPengesah: approveData.tandatanganPengesah,
                        updatedAt: serverTimestamp()
                    });
                    
                    if (currentRecord && currentRecord.id === approvingRecord.id) {
                        setCurrentRecord({
                            ...currentRecord, 
                            disahkanOleh: approveData.disahkanOleh, 
                            tandatanganPengesah: approveData.tandatanganPengesah
                        });
                    }

                    showToast("Pengesahan berjaya disimpan!", "success");
                    closeApproveModal();
                } catch (error) {
                    console.error("Approve error:", error);
                    showToast("Ralat ketika membuat pengesahan.", "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen font-sans flex flex-col pb-10">
                    <header className="bg-blue-800 text-white shadow-md p-4 no-print sticky top-0 z-40">
                        <div className="container mx-auto max-w-6xl flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="bg-white p-1 rounded-full w-12 h-12 flex items-center justify-center">
                                    <img src="logo.png" alt="Logo" className="w-10 h-10 object-contain" onError={(e) => e.target.style.display='none'} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-wide">Sistem Minit Curai</h1>
                                    <p className="text-xs text-blue-200">SK Pendidikan Khas Miri</p>
                                </div>
                            </div>
                            <nav className="flex space-x-2">
                                <button onClick={handleNewForm} className={`px-4 py-2 rounded-md flex items-center transition-colors ${activeTab === 'form' && !editingId ? 'bg-blue-600 font-semibold shadow-inner' : 'hover:bg-blue-700'}`}>
                                    <i className="fas fa-file-alt mr-2"></i> Isi Borang Baru
                                </button>
                                <button onClick={() => setActiveTab('list')} className={`px-4 py-2 rounded-md flex items-center transition-colors ${activeTab === 'list' ? 'bg-blue-600 font-semibold shadow-inner' : 'hover:bg-blue-700'}`}>
                                    <i className="fas fa-list mr-2"></i> Senarai Rekod
                                </button>
                            </nav>
                        </div>
                    </header>

                    {toastMessage && (
                        <div className="fixed top-20 right-4 z-50 animate-bounce no-print">
                            <div className={`rounded-lg shadow-lg px-6 py-4 flex items-center ${toastMessage.type === 'success' ? 'bg-green-100 border border-green-400 text-green-800' : 'bg-red-100 border border-red-400 text-red-800'}`}>
                                <i className={`fas ${toastMessage.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2`}></i>
                                {toastMessage.msg}
                            </div>
                        </div>
                    )}

                    <main className="flex-1 relative">
                        
                        {/* TAB: BORANG ISI MINIT CURAI */}
                        {activeTab === 'form' && (
                            <div className="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md no-print mt-6 mb-12 border-t-4 border-blue-600">
                                <div className="flex justify-between items-center mb-6 border-b pb-2">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                        {editingId ? (
                                            <><i className="fas fa-edit text-yellow-500 mr-2"></i> Kemas Kini Borang</>
                                        ) : (
                                            <><i className="fas fa-plus-circle text-blue-600 mr-2"></i> Isi Borang Minit Curai Baru</>
                                        )}
                                    </h2>
                                    {editingId && (
                                        <span className="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-md text-sm font-semibold">
                                            Mod Suntingan (Edit)
                                        </span>
                                    )}
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-gray-700">Rujukan Bilangan</label>
                                            <div className="flex items-center mt-1">
                                                <span className="bg-gray-100 border border-r-0 border-gray-300 rounded-l-md px-3 py-2 text-sm text-gray-600 font-semibold whitespace-nowrap">
                                                    SKPKM.500-8/8/4(
                                                </span>
                                                <input type="text" name="rujukanBil" value={formData.rujukanBil} onChange={handleChange} className="flex-1 block w-full rounded-none border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Cth: 12 (Boleh dikosongkan)" />
                                                <span className="bg-gray-100 border border-l-0 border-gray-300 rounded-r-md px-3 py-2 text-sm text-gray-600 font-semibold">
                                                    )
                                                </span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Nama</label>
                                            <select name="namaPegawai" required value={formData.namaPegawai} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border bg-white">
                                                <option value="">-- Sila Pilih Nama --</option>
                                                {senaraiNamaStaff.map((nama, index) => (
                                                    <option key={index} value={nama}>{nama}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Jawatan</label>
                                            <input type="text" name="jawatan" required value={formData.jawatan} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Cth: Guru Akademik Biasa" />
                                        </div>
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-gray-700">Perkara / Tajuk Kursus</label>
                                            <input type="text" name="perkara" required value={formData.perkara} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Tajuk seperti dalam surat panggilan..." />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Tarikh / Tempoh Kursus</label>
                                            <input type="text" name="tarikh" required value={formData.tarikh} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Cth: 12 - 14 Mei 2026" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Tempat</label>
                                            <input type="text" name="tempat" required value={formData.tempat} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Cth: PKG Miri" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Anjuran</label>
                                            <input type="text" name="anjuran" required value={formData.anjuran} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Cth: PPD Miri" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700">Pengerusi</label>
                                            <input type="text" name="pengerusi" required value={formData.pengerusi} onChange={handleChange} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Nama pengerusi / penceramah utama" />
                                        </div>
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-gray-700">Bahan Edaran</label>
                                            <div className="flex items-center space-x-6 mt-2">
                                                <label className="flex items-center cursor-pointer">
                                                    <input type="radio" name="bahanEdaran" value="Ada" checked={formData.bahanEdaran === 'Ada'} onChange={handleChange} className="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" />
                                                    <span className="ml-2 text-gray-700">Ada</span>
                                                </label>
                                                <label className="flex items-center cursor-pointer">
                                                    <input type="radio" name="bahanEdaran" value="Tiada" checked={formData.bahanEdaran === 'Tiada'} onChange={handleChange} className="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" />
                                                    <span className="ml-2 text-gray-700">Tiada</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 border-t pt-6 space-y-6">
                                        <h3 className="text-lg font-bold text-gray-800">Catatan Minit / Kandungan Kursus</h3>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">1. Penganjuran</label>
                                            <textarea name="kandunganPenganjuran" required value={formData.kandunganPenganjuran} onChange={handleChange} rows="3" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Nyatakan penganjur, tempoh kursus, bilangan peserta, tempat..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">2. Objektif Kursus</label>
                                            <textarea name="kandunganObjektif" required value={formData.kandunganObjektif} onChange={handleChange} rows="3" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Nyatakan objektif kursus..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">3. Kandungan Kursus LCML</label>
                                            <textarea name="kandunganKandungan" required value={formData.kandunganKandungan} onChange={handleChange} rows="4" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Nyatakan kandungan kursus sepanjang tempoh, aktiviti/tugasan diberi..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">4. Lain-Lain</label>
                                            <textarea name="kandunganLain" required value={formData.kandunganLain} onChange={handleChange} rows="3" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Nyatakan dapatan kursus, apa yang hendak dilakukan apabila kembali ke sekolah nanti..."></textarea>
                                        </div>
                                        
                                        <div className="bg-gray-50 p-4 rounded-md border border-gray-200">
                                            <label className="block text-sm font-bold text-gray-800 mb-1">Tindakan Susulan Oleh Ketua Jabatan</label>
                                            <p className="text-xs text-gray-500 mb-2">Maklumkan apa tindakan susulan peserta hendak lakukan supaya ketua jabatan boleh memantau. (Boleh dibiarkan kosong)</p>
                                            <textarea name="tindakanSusulan" value={formData.tindakanSusulan} onChange={handleChange} rows="3" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" placeholder="Tindakan susulan anda..."></textarea>
                                        </div>
                                        
                                        {/* E-SIGN UNTUK PEGAWAI */}
                                        <div className="bg-blue-50 p-4 rounded-md border border-blue-200 mt-6">
                                            <SignaturePad 
                                                label="Tandatangan Pegawai (Disediakan Oleh)" 
                                                value={formData.tandatanganPegawai} 
                                                onChange={(val) => handleSignatureChange('tandatanganPegawai', val)} 
                                            />
                                        </div>
                                    </div>

                                    <div className="flex justify-end pt-4 space-x-3 border-t">
                                        {editingId && (
                                            <button type="button" onClick={handleCancelEdit} className="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-md shadow-md flex items-center transition-colors">
                                                Batal
                                            </button>
                                        )}
                                        <button type="submit" disabled={isSubmitting} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md shadow-md flex items-center transition-colors disabled:bg-blue-400">
                                            {isSubmitting ? 'Menyimpan...' : <><i className="fas fa-save mr-2"></i> {editingId ? 'Simpan Kemas Kini' : 'Hantar Minit Curai'}</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* TAB: SENARAI REKOD */}
                        {activeTab === 'list' && (
                            <div className="max-w-7xl mx-auto bg-white p-8 rounded-lg shadow-md no-print mt-6 mb-12 border-t-4 border-blue-600">
                                <div className="flex justify-between items-center mb-6 border-b pb-2">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                        <i className="fas fa-list text-blue-600 mr-2"></i> Rekod Minit Curai
                                    </h2>
                                    <span className="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-semibold">
                                        <i className="fas fa-globe mr-1"></i> Boleh dilihat oleh semua warga kerja
                                    </span>
                                </div>
                                
                                {records.length === 0 ? (
                                    <div className="text-center py-16 text-gray-500 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                                        <i className="fas fa-folder-open text-4xl mb-4 text-gray-400"></i>
                                        <p className="text-lg">Tiada rekod minit curai buat masa ini.</p>
                                        <button onClick={handleNewForm} className="mt-4 text-blue-600 hover:underline">Isi borang pertama</button>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto shadow-sm ring-1 ring-black ring-opacity-5 rounded-lg">
                                        <table className="min-w-full divide-y divide-gray-200">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No. Rujukan</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/4">Perkara / Kursus</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                                    <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-gray-200">
                                                {records.map((record) => (
                                                    <tr key={record.id} className="hover:bg-gray-50 transition-colors">
                                                        <td className="px-4 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                            {record.rujukanBil ? `SKPKM.500-8/8/4(${record.rujukanBil})` : `SKPKM.500-8/8/4()`}
                                                        </td>
                                                        <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-700">{record.namaPegawai}</td>
                                                        <td className="px-4 py-4 text-sm text-gray-700 max-w-xs truncate" title={record.perkara}>{record.perkara}</td>
                                                        <td className="px-4 py-4 whitespace-nowrap text-sm">
                                                            {(record.disahkanOleh || record.tandatanganPengesah) ? (
                                                                <span className="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800" title={`Disahkan oleh: ${record.disahkanOleh || 'Telah disahkan'}`}>
                                                                    <i className="fas fa-check-circle mr-1 mt-0.5"></i> Disahkan
                                                                </span>
                                                            ) : (
                                                                <span className="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">
                                                                    <i className="fas fa-clock mr-1 mt-0.5"></i> Menunggu
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="px-4 py-4 whitespace-nowrap text-right text-sm font-medium">
                                                            <div className="flex justify-end space-x-2">
                                                                <button onClick={() => openApproveModal(record)} className={`text-white px-3 py-1.5 rounded flex items-center transition-colors shadow-sm ${(record.disahkanOleh || record.tandatanganPengesah) ? 'bg-green-600 hover:bg-green-700' : 'bg-emerald-500 hover:bg-emerald-600'}`} title={(record.disahkanOleh || record.tandatanganPengesah) ? "Lihat / Kemas Kini Pengesahan" : "Sahkan Borang (Guru Besar / PK)"}>
                                                                    <i className="fas fa-check-double"></i>
                                                                </button>
                                                                <button onClick={() => { setCurrentRecord(record); setActiveTab('print'); }} className="text-white bg-blue-500 hover:bg-blue-600 px-3 py-1.5 rounded flex items-center transition-colors shadow-sm" title="Papar & Cetak">
                                                                    <i className="fas fa-print"></i>
                                                                </button>
                                                                <button onClick={() => handleEdit(record)} className="text-white bg-yellow-500 hover:bg-yellow-600 px-3 py-1.5 rounded flex items-center transition-colors shadow-sm" title="Edit">
                                                                    <i className="fas fa-edit"></i>
                                                                </button>
                                                                {/* BUTANG PADAM DIKEMAS KINI MEMANGGIL MODAL */}
                                                                <button onClick={() => setDeleteConfirmId(record.id)} className="text-white bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded flex items-center transition-colors shadow-sm" title="Padam Rekod">
                                                                    <i className="fas fa-trash"></i>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* MODAL PENGESAHAN PADAM REKOD (BARU) */}
                        {deleteConfirmId && (
                            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 no-print transition-opacity">
                                <div className="bg-white rounded-lg shadow-2xl max-w-sm w-full flex flex-col overflow-hidden">
                                    <div className="bg-red-600 text-white p-4 flex justify-between items-center">
                                        <h3 className="font-bold text-lg flex items-center"><i className="fas fa-exclamation-triangle mr-2"></i> Pengesahan Padam</h3>
                                        <button onClick={() => setDeleteConfirmId(null)} className="text-red-100 hover:text-white transition-colors">
                                            <i className="fas fa-times text-xl"></i>
                                        </button>
                                    </div>
                                    <div className="p-6 text-center">
                                        <i className="fas fa-trash-alt text-red-500 text-5xl mb-4"></i>
                                        <p className="text-gray-800 text-lg font-bold mb-2">Adakah anda pasti?</p>
                                        <p className="text-sm text-gray-600">Tindakan ini akan memadam rekod minit curai secara kekal dan ia tidak boleh dibatalkan lagi.</p>
                                    </div>
                                    <div className="bg-gray-100 p-4 flex justify-center space-x-3 border-t">
                                        <button onClick={() => setDeleteConfirmId(null)} className="px-5 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-md font-medium transition-colors">
                                            Batal
                                        </button>
                                        <button onClick={confirmDelete} disabled={isSubmitting} className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md font-bold transition-colors shadow-md">
                                            {isSubmitting ? 'Memadam...' : 'Ya, Padam'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL / POP-UP PENGESAHAN KETUA JABATAN (DENGAN BACAAN) */}
                        {approvingRecord && (
                            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 no-print transition-opacity">
                                <div className="bg-white rounded-lg shadow-2xl max-w-2xl w-full flex flex-col max-h-[95vh]">
                                    
                                    {/* Header Modal */}
                                    <div className="bg-green-600 text-white p-4 flex justify-between items-center rounded-t-lg shrink-0">
                                        <h3 className="font-bold text-lg flex items-center"><i className="fas fa-check-double mr-2"></i> Pengesahan & Semakan Minit Curai</h3>
                                        <button onClick={closeApproveModal} className="text-green-100 hover:text-white transition-colors">
                                            <i className="fas fa-times text-xl"></i>
                                        </button>
                                    </div>
                                    
                                    {/* Badan Modal (Boleh Skrol) */}
                                    <div className="p-6 overflow-y-auto flex-1">
                                        
                                        {/* BAHAGIAN 1: BACAAN MINIT CURAI */}
                                        <div className="mb-6 bg-blue-50 p-5 rounded-lg border border-blue-200 shadow-inner">
                                            <h4 className="font-bold text-gray-800 text-lg mb-1">{approvingRecord.perkara}</h4>
                                            <p className="text-sm text-gray-600 border-b border-blue-200 pb-2 mb-3">
                                                Disediakan Oleh: <span className="font-bold text-gray-800">{approvingRecord.namaPegawai}</span> | Tarikh: {approvingRecord.tarikh}
                                            </p>
                                            
                                            <div className="space-y-4 text-sm text-gray-800">
                                                <div>
                                                    <span className="font-bold text-blue-800">1. Objektif Kursus:</span>
                                                    <p className="whitespace-pre-wrap mt-1 bg-white p-2 rounded border border-blue-100">{approvingRecord.kandunganObjektif}</p>
                                                </div>
                                                <div>
                                                    <span className="font-bold text-blue-800">2. Kandungan Kursus:</span>
                                                    <p className="whitespace-pre-wrap mt-1 bg-white p-2 rounded border border-blue-100">{approvingRecord.kandunganKandungan}</p>
                                                </div>
                                                <div>
                                                    <span className="font-bold text-red-700">3. Tindakan Susulan Oleh Ketua Jabatan:</span>
                                                    <p className="whitespace-pre-wrap mt-1 bg-white p-2 rounded border border-red-100">{approvingRecord.tindakanSusulan || 'Tiada catatan tindakan susulan.'}</p>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* BAHAGIAN 2: RUANGAN TANDATANGAN */}
                                        <div className="space-y-5">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Nama Pengesah (Wajib Pilih)</label>
                                                <select 
                                                    value={approveData.disahkanOleh} 
                                                    onChange={(e) => setApproveData({...approveData, disahkanOleh: e.target.value})} 
                                                    className="block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm p-2 border bg-white" 
                                                >
                                                    <option value="">-- Sila Pilih Nama Pengesah --</option>
                                                    <option value="AZIZ BIN TAHIR (GURU BESAR)">AZIZ BIN TAHIR (GURU BESAR)</option>
                                                    <option value="MOHAMAD ABIDIN BIN SIPEK (PENOLONG KANAN PENTADBIRAN)">MOHAMAD ABIDIN BIN SIPEK (PENOLONG KANAN PENTADBIRAN)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <SignaturePad 
                                                    label="Lakar Tandatangan Pengesah Digital" 
                                                    value={approveData.tandatanganPengesah} 
                                                    onChange={(val) => setApproveData({...approveData, tandatanganPengesah: val})} 
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Footer Modal */}
                                    <div className="bg-gray-100 p-4 flex justify-end space-x-3 border-t rounded-b-lg shrink-0">
                                        <button onClick={closeApproveModal} className="px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-md font-medium transition-colors">
                                            Batal
                                        </button>
                                        <button onClick={submitApprove} disabled={isSubmitting} className="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-md font-bold transition-colors flex items-center shadow-md">
                                            {isSubmitting ? 'Menyimpan...' : <><i className="fas fa-check mr-2"></i> Sahkan & Simpan</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: PAPARAN CETAK PDF */}
                        {activeTab === 'print' && currentRecord && (() => {
                            const r = currentRecord;
                            return (
                                <div className="print-wrapper py-6 no-print-bg">
                                    <div className="max-w-[210mm] mx-auto mb-4 flex justify-between items-center no-print">
                                        <button onClick={() => setActiveTab('list')} className="text-gray-600 hover:text-gray-900 flex items-center bg-white px-4 py-2 rounded shadow-sm border border-gray-200">
                                            <i className="fas fa-arrow-left mr-2"></i> Kembali ke Senarai
                                        </button>
                                        <div className="flex items-center space-x-3">
                                            {/* BUTANG SAHKAN DARI PAPARAN CETAK (Sembunyikan jika sudah sah) */}
                                            {!(r.disahkanOleh || r.tandatanganPengesah) && (
                                                <button onClick={() => openApproveModal(r)} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded shadow-md flex items-center transition-colors">
                                                    <i className="fas fa-check-double mr-2"></i> Sahkan Borang
                                                </button>
                                            )}
                                            <span className="text-sm text-gray-500 ml-2">Pilih 'Save as PDF' di tetingkap cetakan</span>
                                            <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow-md flex items-center transition-colors">
                                                <i className="fas fa-print mr-2"></i> Jana PDF / Cetak
                                            </button>
                                        </div>
                                    </div>

                                    <div className="print-view bg-white text-black mx-auto w-full max-w-[210mm] min-h-[297mm] p-[20mm] shadow-xl border border-gray-300 relative">
                                        
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="w-24 flex-shrink-0">
                                                <img src="logo.png" alt="Logo SKPK Miri" className="w-24 h-24 object-contain" 
                                                     onError={(e) => { 
                                                         e.target.onerror = null; 
                                                         e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="%23000" stroke-width="2"/><text x="50" y="50" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">LOGO</text></svg>' 
                                                     }} 
                                                />
                                            </div>
                                            <div className="flex-1 text-center">
                                                <p className="font-bold text-lg m-0">SEKOLAH KEBANGSAAN PENDIDIKAN KHAS MIRI</p>
                                                <p className="m-0 text-base">JALAN DATUK MUIP, PIASAU JAYA</p>
                                                <p className="m-0 text-base">98000 MIRI, SARAWAK</p>
                                            </div>
                                            <div className="w-24 flex-shrink-0"></div>
                                        </div>

                                        <div className="text-right mb-6 text-sm font-semibold">
                                            <p>RUJUKAN BIL: SKPKM.500-8/8/4({r.rujukanBil})</p>
                                        </div>

                                        <h1 className="text-center font-bold text-lg underline mb-8">BORANG LAPORAN / MINIT CURAI</h1>

                                        <div className="text-[14px] leading-relaxed mb-6 space-y-2">
                                            <div className="flex">
                                                <div className="w-40 font-semibold uppercase">NAMA</div>
                                                <div className="w-4 text-center">:</div>
                                                <div className="flex-1 border-b border-dotted border-black font-semibold uppercase px-2">{r.namaPegawai}</div>
                                                <div className="w-24 font-semibold uppercase text-right mr-4">JAWATAN:</div>
                                                <div className="w-48 border-b border-dotted border-black font-semibold uppercase px-2">{r.jawatan}</div>
                                            </div>
                                            
                                            {[
                                                ['PERKARA', r.perkara],
                                                ['TARIKH', r.tarikh],
                                                ['TEMPAT', r.tempat],
                                                ['ANJURAN', r.anjuran],
                                                ['PENGERUSI', r.pengerusi],
                                                ['BAHAN EDARAN', r.bahanEdaran]
                                            ].map(([label, val]) => (
                                                <div className="flex" key={label}>
                                                    <div className="w-40 font-semibold uppercase">{label}</div>
                                                    <div className="w-4 text-center">:</div>
                                                    <div className="flex-1 border-b border-dotted border-black px-2 uppercase">{val}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="font-semibold text-[14px] mb-2 uppercase">CATATAN MINIT :</div>

                                        <div className="mb-6">
                                            <div className="font-bold text-center border border-black p-1 bg-gray-100 uppercase text-[14px]">KANDUNGAN KURSUS</div>
                                            <div className="border-x border-b border-black p-3 text-[14px] min-h-[70px]">
                                                <span className="font-semibold underline">Penganjuran:</span><br/>
                                                <div className="whitespace-pre-wrap mt-1 text-justify">{r.kandunganPenganjuran}</div>
                                            </div>
                                            <div className="border-x border-b border-black p-3 text-[14px] min-h-[70px]">
                                                <span className="font-semibold underline">Objektif Kursus:</span><br/>
                                                <div className="whitespace-pre-wrap mt-1 text-justify">{r.kandunganObjektif}</div>
                                            </div>
                                            <div className="border-x border-b border-black p-3 text-[14px] min-h-[100px]">
                                                <span className="font-semibold underline">Kandungan Kursus LCML:</span><br/>
                                                <div className="whitespace-pre-wrap mt-1 text-justify">{r.kandunganKandungan}</div>
                                            </div>
                                            <div className="border-x border-b border-black p-3 text-[14px] min-h-[70px]">
                                                <span className="font-semibold underline">Lain-Lain:</span><br/>
                                                <div className="whitespace-pre-wrap mt-1 text-justify">{r.kandunganLain}</div>
                                            </div>
                                        </div>

                                        <div className="mb-8 border border-black p-3 text-[14px] min-h-[100px]">
                                            <div className="font-semibold mb-2 underline uppercase">TINDAKAN SUSULAN OLEH KETUA JABATAN:</div>
                                            <div className="whitespace-pre-wrap text-justify">{r.tindakanSusulan}</div>
                                        </div>

                                        {/* CETAKAN TANDATANGAN & E-SIGN */}
                                        <div className="flex justify-between mt-10 text-[14px] font-semibold">
                                            
                                            {/* Ruangan Pegawai */}
                                            <div className="text-center w-64">
                                                <p className="mb-2 uppercase">DISEDIAKAN OLEH,</p>
                                                {r.tandatanganPegawai ? (
                                                    <div className="h-20 flex items-end justify-center mb-1">
                                                        <img src={r.tandatanganPegawai} alt="Tandatangan" className="max-h-20 object-contain" />
                                                    </div>
                                                ) : (
                                                    <div className="h-20 mb-1"></div>
                                                )}
                                                <p className="border-t border-dotted border-black w-full mx-auto pt-1 whitespace-pre uppercase">
                                                    ( {r.namaPegawai} )
                                                </p>
                                            </div>
                                            
                                            {/* Ruangan Guru Besar / PK */}
                                            <div className="text-center w-64">
                                                <p className="mb-2 uppercase">DISAHKAN OLEH,</p>
                                                
                                                {(r.disahkanOleh || r.tandatanganPengesah) ? (
                                                    <div className="h-20 flex items-center justify-center relative mb-1">
                                                        {r.tandatanganPengesah && (
                                                            <img src={r.tandatanganPengesah} alt="Tandatangan Pengesah" className="max-h-20 object-contain absolute z-10" />
                                                        )}
                                                        {/* Cap E-Disahkan */}
                                                        <span className="border-[3px] border-green-600 text-green-600 font-extrabold px-3 py-1 inline-block rotate-[-10deg] text-xs opacity-60 uppercase tracking-widest rounded-md relative z-0">
                                                            E-DISAHKAN
                                                        </span>
                                                    </div>
                                                ) : (
                                                    <div className="h-20 mb-1"></div>
                                                )}
                                                
                                                <p className="border-t border-dotted border-black w-full mx-auto pt-1 whitespace-pre uppercase">
                                                    ( {r.disahkanOleh ? r.disahkanOleh : '                                                '} )
                                                </p>
                                            </div>
                                            
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SistemMinitCurai />);
    </script>
</body>
</html>
